<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chadlington Climate Change and Biodiversity Action Group</title>
    <style>
        :root {
            --bg-color: #e6e4de; 
            --link-green: #29a366; 
            --text-grey: #444444;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #000;
            line-height: 1.4;
        }

        /* Hero Banner */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 280px;
            background-image: url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-bottom: 1px solid #ccc;
        }

        .hero-banner::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.35);
        }

        .hero-title {
            position: relative;
            color: white;
            font-size: 42px;
            font-weight: 500;
            max-width: 800px;
            margin: 0;
            padding: 0 20px;
        }

        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
        }

        /* 4-Image Grid */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 50px;
        }

        .grid-item {
            aspect-ratio: 1.45 / 1;
            overflow: hidden;
            background: #ccc;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* --- THE IFRAME MAP SECTION --- */
        .map-section {
            margin-bottom: 60px;
            text-align: center;
        }

        .map-header {
            color: var(--link-green);
            text-decoration: underline;
            font-size: 24px;
            margin-bottom: 20px;
            display: block;
        }

        .map-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #d1cfc9; /* Background while loading */
            border-radius: 4px;
            border: 1px solid #bbb;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* The actual Iframe */
        .map-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            z-index: 2;
        }

        /* Optional: A simple loading spinner behind the iframe */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--link-green);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            z-index: 1;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Navigation Links Grid */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            text-align: center;
        }

        .link-box h2 { font-size: 22px; margin: 0 0 10px 0; }
        .link-box a { color: var(--link-green); text-decoration: underline; }
        .link-box p { font-size: 13px; color: var(--text-grey); margin: 0; }

        @media (max-width: 768px) {
            .image-grid, .links-grid { grid-template-columns: 1fr 1fr; }
            .hero-title { font-size: 28px; }
        }
    </style>
</head>
<body>

    <header class="hero-banner">
        <h1 class="hero-title">Chadlington Climate Change and Biodiversity Action Group</h1>
    </header>

    <div class="container">
        
        <div class="image-grid">
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?w=400"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400"></div>
        </div>

        <section class="map-section">
            <span class="map-header">Live Interactive Map</span>
            <div class="map-wrapper">
                <div class="loader"></div>
                <iframe 
                    src="https://go.thelandapp.com/map/67308830e55c2e69ddce6905/embed" 
                    title="Chadlington Map Tool"
                    loading="lazy"
                    allowfullscreen>
                </iframe>
            </div>
        </section>

        <div class="links-grid">
            <div class="link-box">
                <h2><a href="#">Events</a></h2>
                <p>Upcoming and past events. All are welcome.</p>
            </div>
            <div class="link-box">
                <h2><a href="#">About</a></h2>
                <p>Who we are and what our mission is.</p>
            </div>
            <div class="link-box">
                <h2><a href="#">Butterflies</a></h2>
                <p>Common butterflies in Chadlington.</p>
            </div>
            <div class="link-box">
                <h2><a href="#">LandApp</a></h2>
                <p>Mapping biodiversity in Chadlington.</p>
            </div>
        </div>

    </div>

</body>
</html>
